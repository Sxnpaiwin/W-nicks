version: 6
can_use_existing_players: true

# This feature is highly experimental. Do not enable unless you know what you're doing.
should_spoof_uuid: false

# Prefix prepended to most user-facing plugin messages.
# Supports MiniMessage formatting. Set to "" to disable the prefix entirely.
message_prefix: "<gold>[W-Nick]</gold> "

# When true, players who log in with a previously saved nick
# (e.g. after a server restart) will automatically have their nick, skin,
# and fake rank re-applied.
auto_apply_nick_on_join: true

# When true, /nick random (and the API randomNick()) will
# automatically pick a random assignable rank from LuckPerms for the player,
# if they don't already have a fake rank set via /nickrank set.
# Set to false to disable random rank assignment entirely.
auto_assign_random_rank_on_random_nick: true

# Storage Configuration
storage:
  # Storage type: LOCAL or MONGODB
  type: "LOCAL"
  mongodb:
    # Connection URI (e.g., mongodb://localhost:27017)
    uri: "mongodb://localhost:27017"
    # Database name
    database: "nametag"
    # Collection name
    collection: "players"
    # Connection pool size
    pool-size: 10
