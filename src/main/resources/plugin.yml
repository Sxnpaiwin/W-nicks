name: W-Nick
version: "1.0.81-W-Nick"
main: wnick.NameTagPlugin
api-version: '1.21.8'
authors: [Joehe]
description: LuckPerms-aware nick plugin with rank spoofing and Paper Dialog API integration.
website: https://github.com/Sxnpaiwin/W-nicks
softdepend:
  - TAB
  - PlaceholderAPI
  - LuckPerms
folia-supported: true
commands:
  nick:
    description: Set, reset, or change your nickname.
  randomnick:
    description: Generate a random nickname.
  nametag:
    description: Admin / debug command.
  realname:
    description: Look up who's behind a nick.
  nickrank:
    description: Manage your LuckPerms fake rank.
    aliases: [nr, fakerank]
    usage: |
      /nickrank list [all|assignable] - list available ranks
      /nickrank set <rank> [targets] - set a fake rank
      /nickrank clear [targets]      - clear a fake rank
      /nickrank random [targets]     - pick a random assignable rank
      /nickrank current [target]     - show your current fake rank
  wnick:
    description: W-Nick master command (help, info, guide, version, reload).
    aliases: [wn]
permissions:
  wnick.commands.nick:
    description: Allows /nick
    default: op
  wnick.commands.nick.others:
    description: Allows nicking other players
    default: op
  wnick.commands.nick.reset:
    description: Allows /nick reset
    default: op
  wnick.commands.nick.reset_all:
    description: Allows /nick reset_all
    default: op
  wnick.commands.nick.save_all:
    description: Allows /nick save_all
    default: op
  wnick.commands.nick.save_cached:
    description: Allows /nick save_cached
    default: op
  wnick.commands.randomnick:
    description: Allows /randomnick
    default: op
  wnick.commands.randomnick.others:
    description: Allows random-nicking other players
    default: op
  wnick.commands.realname:
    description: Allows /realname
    default: true
  wnick.commands.nickrank:
    description: Allows access to /nickrank
    default: op
  wnick.commands.nickrank.list:
    description: Allows listing available ranks
    default: op
  wnick.commands.nickrank.set:
    description: Allows setting a fake rank on yourself
    default: op
  wnick.commands.nickrank.clear:
    description: Allows clearing your fake rank
    default: op
  wnick.commands.nickrank.random:
    description: Allows picking a random assignable rank
    default: op
  wnick.commands.nickrank.current:
    description: Allows viewing your current fake rank
    default: op
  wnick.commands.nickrank.others:
    description: Allows acting on other players' fake rank
    default: op
  wnick.commands.wnick:
    description: Allows access to /wnick
    default: op
  wnick.commands.wnick.guide:
    description: Allows /wnick guide (opens the Paper Dialog)
    default: op
  wnick.commands.wnick.info:
    description: Allows /wnick info on yourself
    default: op
  wnick.commands.wnick.info.others:
    description: Allows /wnick info on other players
    default: op
  wnick.admin.reload:
    description: Allows /wnick reload and /nametag reload
    default: op
  wnick.admin.refresh_player:
    description: Allows /nametag refresh_player
    default: op
  wnick.admin.debug:
    description: Allows /nametag debug
    default: op
  wnick.rank.assignable:
    description: Tags a LuckPerms group as randomly assignable for /nickrank random
    default: false
