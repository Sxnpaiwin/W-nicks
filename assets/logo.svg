<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC857"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="64" x2="256" y2="64" stroke="white" stroke-width="1"/>
    <line x1="0" y1="128" x2="256" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="192" x2="256" y2="192" stroke="white" stroke-width="1"/>
    <line x1="64" y1="0" x2="64" y2="256" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="256" stroke="white" stroke-width="1"/>
    <line x1="192" y1="0" x2="192" y2="256" stroke="white" stroke-width="1"/>
  </g>

  <!-- Player head card (represents the nick/skin feature) -->
  <g transform="translate(48, 48)">
    <!-- Card background -->
    <rect width="160" height="160" rx="20" fill="url(#card)" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>

    <!-- "W" letterform -->
    <path d="M 35 50 L 50 110 L 65 70 L 80 110 L 95 50"
          stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Nick name indicator (small chat bubble) -->
    <g transform="translate(105, 95)">
      <rect x="0" y="0" width="40" height="22" rx="6" fill="url(#accent)" opacity="0.9"/>
      <text x="20" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#1a1a2e" text-anchor="middle">NICK</text>
    </g>

    <!-- Crown icon (represents the fake rank feature) -->
    <g transform="translate(55, 125)">
      <path d="M 0 12 L 5 0 L 12 8 L 20 0 L 28 8 L 35 0 L 40 12 L 35 20 L 5 20 Z"
            fill="url(#accent)" opacity="0.85"/>
      <circle cx="20" cy="14" r="2" fill="#1a1a2e" opacity="0.4"/>
    </g>
  </g>

  <!-- Corner accent dots -->
  <circle cx="24" cy="24" r="4" fill="url(#accent)" opacity="0.6"/>
  <circle cx="232" cy="24" r="4" fill="url(#accent)" opacity="0.4"/>
  <circle cx="24" cy="232" r="4" fill="url(#accent)" opacity="0.4"/>
  <circle cx="232" cy="232" r="4" fill="url(#accent)" opacity="0.6"/>
</svg>
