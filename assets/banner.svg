<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFC857"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AEFFC1"/>
      <stop offset="100%" stop-color="#56D9A3"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="320" stroke="white" stroke-width="1"/>
  </g>

  <!-- Centered content block: logo + title + tagline + feature pills -->
  <!-- Logo on the left of the block -->
  <g transform="translate(320, 80)">
    <rect width="160" height="160" rx="32" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
    <path d="M 35 50 L 50 110 L 65 70 L 80 110 L 95 50 L 110 110 L 125 70 L 140 110 L 125 50"
          stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
    <!-- Crown -->
    <g transform="translate(50, 120)">
      <path d="M 0 12 L 5 0 L 12 8 L 20 0 L 28 8 L 35 0 L 40 12 L 35 20 L 5 20 Z"
            fill="url(#accent)" opacity="0.9"/>
      <circle cx="20" cy="14" r="2" fill="#0f0f1e" opacity="0.5"/>
    </g>
  </g>

  <!-- Title and tagline (right of the logo) -->
  <g transform="translate(520, 0)">
    <!-- W-Nick title -->
    <text x="0" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">
      W-Nick
    </text>

    <!-- Accent underline -->
    <rect x="2" y="145" width="180" height="4" rx="2" fill="url(#accent)"/>

    <!-- Tagline -->
    <text x="0" y="185" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#a0a0b8" letter-spacing="0.5">
      LuckPerms-aware nick plugin for Paper 1.21.8+
    </text>

    <!-- Feature pills -->
    <g transform="translate(0, 215)" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">
      <g>
        <rect width="150" height="32" rx="16" fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-opacity="0.3" stroke-width="1"/>
        <circle cx="18" cy="16" r="4" fill="url(#accent)"/>
        <text x="32" y="21" fill="#FFC857">Rank Spoofing</text>
      </g>
      <g transform="translate(165, 0)">
        <rect width="160" height="32" rx="16" fill="url(#accent2)" opacity="0.15" stroke="url(#accent2)" stroke-opacity="0.3" stroke-width="1"/>
        <circle cx="18" cy="16" r="4" fill="url(#accent2)"/>
        <text x="32" y="21" fill="#AEFFC1">Paper Dialogs</text>
      </g>
      <g transform="translate(340, 0)">
        <rect width="130" height="32" rx="16" fill="#ffffff" opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
        <circle cx="18" cy="16" r="4" fill="#8b8ba8"/>
        <text x="32" y="21" fill="#c0c0d0">No Telemetry</text>
      </g>
      <g transform="translate(485, 0)">
        <rect width="120" height="32" rx="16" fill="#ffffff" opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
        <circle cx="18" cy="16" r="4" fill="#8b8ba8"/>
        <text x="32" y="21" fill="#c0c0d0">Lightweight</text>
      </g>
    </g>
  </g>

  <!-- Corner accents -->
  <circle cx="30" cy="30" r="3" fill="url(#accent)" opacity="0.5"/>
  <circle cx="1170" cy="30" r="3" fill="url(#accent)" opacity="0.3"/>
  <circle cx="30" cy="290" r="3" fill="url(#accent)" opacity="0.3"/>
  <circle cx="1170" cy="290" r="3" fill="url(#accent)" opacity="0.5"/>
</svg>
